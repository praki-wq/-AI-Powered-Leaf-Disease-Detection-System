<!DOCTYPE html>
<html>

<head>

    <title>Detect Disease</title>

    <link rel="stylesheet" href="/static/style.css">

</head>


<body>

<div class="navbar">

    <div class="logo">
        🌿 Ai Powered Leaf Disease Detection
    </div>

    <div class="nav-links">

        <a href="/dashboard">Dashboard</a>

        <a href="/detect">Detect</a>

        <a href="/history">History</a>

        <a href="/about">About</a>

    </div>

</div>
    <div class="back-container">

    <button
        onclick="history.back()"
        class="back-btn"
    >
        ← Back
    </button>

</div>

<div class="container">

    <h1 class="title">
        Detect Leaf Disease
    </h1>

    <div class="card">

        <form
            id="detectForm"
            action="/disease-detection-file"
            method="POST"
            enctype="multipart/form-data"
        >

            <input
                type="file"
                name="file"
                id="file-input"
                accept="image/*"
            >
            <img
                id="preview-image"
                class="preview-image"
            >

            <button 
                id="detectBtn"
                type="submit"
            >
                Detect Disease
            </button>

            <div
    id="loading"
    class="loading"
>

    <div class="spinner"></div>

    <p>
        AI is analyzing leaf disease...
    </p>

</div>

        </form>

    </div>

</div>

<script>

const input =
document.getElementById(
    "file-input"
);

input.onchange = evt => {

    const [file] =
    input.files;

    if(file){

        document
        .getElementById(
            "preview-image"
        )
        .src =
        URL.createObjectURL(file);

    }

}

document
.getElementById(
    "detectForm"
)
.addEventListener(
    "submit",
    function(){

        document
        .getElementById(
            "loading"
        )
        .style.display = "block"

        document
        .getElementById(
            "detectBtn"
        )
        .disabled = true

        document
        .getElementById(
            "detectBtn"
        )
        .innerHTML =
        "Analyzing..."
    }
)

</script>


</body>

</html>
