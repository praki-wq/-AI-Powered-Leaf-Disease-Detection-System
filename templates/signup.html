<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            🌱 Create Account
        </h1>

        <h2>
            Signup
        </h2>

        <form
            action="/signup"
            method="POST"
        >

            <input
                type="text"
                name="username"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have an account?

            <a href="/login">
                Login
            </a>
        </p>

    </div>

</div>

</body>

</html>
